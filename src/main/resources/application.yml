spring:
  application:
    name: university-management-system
  datasource:
    url: jdbc:postgresql://localhost:5432/university_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

jwt:
  secret: BagdauletAskarSecretKey2024UniversityManagementSystem
  expiration: 86400000

file:
  upload-dir: uploads/

logging:
  level:
    com.example.finalproject100: DEBUG
    org.springframework.security: INFO
  file:
    name: logs/app.log
